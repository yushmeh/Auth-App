<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTH_SYS v2.4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   ROOT VARIABLES & RESET
═══════════════════════════════════════════════ */
:root {
  --green:        #00ff41;
  --green-dim:    #00c032;
  --green-dark:   #003b0f;
  --green-glow:   rgba(0,255,65,.18);
  --amber:        #ffb000;
  --red:          #ff3333;
  --bg:           #020c03;
  --panel-bg:     rgba(0,18,5,.92);
  --border:       #00ff4133;
  --font-mono:    'Share Tech Mono', monospace;
  --font-display: 'VT323', monospace;
  --scanline-h:   3px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--green);
  font-family: var(--font-mono);
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   CRT SCANLINES OVERLAY
═══════════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scanline-h) - 1px),
    rgba(0,0,0,.13) var(--scanline-h)
  );
  animation: scanroll 8s linear infinite;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9998;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.7) 100%);
}
@keyframes scanroll {
  from { background-position: 0 0; }
  to   { background-position: 0 100px; }
}

/* ═══════════════════════════════════════════════
   NOISE TEXTURE
═══════════════════════════════════════════════ */
#noise {
  position: fixed; inset: 0; z-index: 9997;
  pointer-events: none;
  opacity: .028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: noiseShift 0.5s steps(1) infinite;
}
@keyframes noiseShift {
  0%  { background-position: 0 0; }
  25% { background-position: -30px 15px; }
  50% { background-position: 20px -10px; }
  75% { background-position: -10px 25px; }
}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
.sys-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeDown .6s ease both;
}
.sys-title {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 6vw, 4rem);
  letter-spacing: .2em;
  text-shadow: 0 0 20px var(--green), 0 0 60px var(--green-dim);
  animation: glitch 5s infinite;
}
.sys-sub {
  font-size: .72rem;
  letter-spacing: .35em;
  color: var(--green-dim);
  margin-top: 4px;
}
.blink { animation: blink 1.1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* glitch on title */
@keyframes glitch {
  0%,94%,100% { text-shadow: 0 0 20px var(--green), 0 0 60px var(--green-dim); transform: none; }
  95% { transform: translate(-2px,0) skewX(-1deg); text-shadow: -2px 0 var(--amber), 2px 0 var(--red); }
  97% { transform: translate(2px,0) skewX(1deg);  text-shadow:  2px 0 var(--amber),-2px 0 var(--red); }
  99% { transform: none; }
}

/* ═══════════════════════════════════════════════
   PANEL
═══════════════════════════════════════════════ */
.panel {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 2px;
  width: 100%;
  max-width: 460px;
  padding: 28px 32px 32px;
  box-shadow: 0 0 40px var(--green-glow), inset 0 0 30px rgba(0,255,65,.03);
  animation: fadeUp .5s ease both;
  position: relative;
  overflow: hidden;
}
/* top chrome bar */
.panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer {
  0%,100% { opacity: .3; }
  50%      { opacity: 1; }
}

.panel-title {
  font-family: var(--font-display);
  font-size: 1.6rem;
  letter-spacing: .2em;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-title::before {
  content: '▶';
  font-size: 1rem;
  color: var(--green-dim);
}

/* ═══════════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════════ */
.field {
  margin-bottom: 18px;
}
.field label {
  display: block;
  font-size: .72rem;
  letter-spacing: .2em;
  color: var(--green-dim);
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: rgba(0,255,65,.04);
  border: 1px solid var(--border);
  border-radius: 1px;
  color: var(--green);
  font-family: var(--font-mono);
  font-size: .95rem;
  padding: 10px 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  caret-color: var(--green);
}
.field input:focus {
  border-color: var(--green-dim);
  box-shadow: 0 0 12px var(--green-glow);
  background: rgba(0,255,65,.07);
}
.field input::placeholder { color: #1a4d1f; }

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btn {
  width: 100%;
  padding: 11px 20px;
  background: transparent;
  border: 1px solid var(--green-dim);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: .9rem;
  letter-spacing: .15em;
  cursor: pointer;
  transition: all .18s;
  position: relative;
  overflow: hidden;
  margin-top: 4px;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--green);
  transform: translateX(-101%);
  transition: transform .22s ease;
  z-index: -1;
}
.btn:hover { color: var(--bg); border-color: var(--green); }
.btn:hover::after { transform: translateX(0); }
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn:disabled:hover { color: var(--green); }
.btn:disabled:hover::after { transform: translateX(-101%); }

.btn-ghost {
  border-color: var(--border);
  color: var(--green-dim);
  font-size: .8rem;
  margin-top: 12px;
}
.btn-ghost:hover { border-color: var(--green-dim); }

.btn-danger {
  border-color: #ff333355;
  color: var(--red);
  margin-top: 8px;
}
.btn-danger::after { background: var(--red); }

/* ═══════════════════════════════════════════════
   TOAST MESSAGES
═══════════════════════════════════════════════ */
#toast-area {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--panel-bg);
  border-left: 3px solid var(--green);
  padding: 10px 16px;
  font-size: .8rem;
  letter-spacing: .07em;
  max-width: 320px;
  animation: toastIn .3s ease both;
  box-shadow: 0 0 20px rgba(0,255,65,.1);
}
.toast.error  { border-color: var(--red);   color: var(--red); }
.toast.warn   { border-color: var(--amber); color: var(--amber); }
.toast.out { animation: toastOut .3s ease forwards; }
@keyframes toastIn  { from { opacity:0; transform: translateX(20px); } }
@keyframes toastOut { to   { opacity:0; transform: translateX(30px); } }

/* ═══════════════════════════════════════════════
   STATUS PANEL
═══════════════════════════════════════════════ */
.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
}
.metric-card {
  border: 1px solid var(--border);
  padding: 14px;
  position: relative;
  background: rgba(0,255,65,.02);
}
.metric-card .m-label {
  font-size: .65rem;
  letter-spacing: .25em;
  color: var(--green-dim);
  margin-bottom: 6px;
}
.metric-card .m-value {
  font-family: var(--font-display);
  font-size: 2rem;
  line-height: 1;
  text-shadow: 0 0 10px var(--green);
}
.metric-card .m-unit {
  font-size: .7rem;
  color: var(--green-dim);
  margin-left: 2px;
}
.bar-wrap {
  height: 3px;
  background: var(--green-dark);
  margin-top: 8px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--green);
  transition: width 1s ease;
  box-shadow: 0 0 6px var(--green);
}
.bar-fill.hot { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.bar-fill.crit { background: var(--red);  box-shadow: 0 0 6px var(--red); }

.log-line {
  font-size: .75rem;
  color: var(--green-dim);
  padding: 3px 0;
  border-bottom: 1px solid rgba(0,255,65,.06);
  display: flex;
  gap: 8px;
}
.log-line .ts { color: #1f5c26; min-width: 80px; }
.log-line .lvl-ok   { color: var(--green); }
.log-line .lvl-warn { color: var(--amber); }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0;
}

/* ═══════════════════════════════════════════════
   PROMPT LINE AT BOTTOM
═══════════════════════════════════════════════ */
.prompt-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 6px 20px;
  font-size: .68rem;
  color: var(--green-dark);
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  justify-content: space-between;
  z-index: 100;
  letter-spacing: .1em;
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════ */
@keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } }
@keyframes fadeUp   { from { opacity:0; transform: translateY(16px);  } }

.hidden { display: none !important; }

/* tabs row */
.tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 22px;
}
.tab {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-bottom: none;
  color: var(--green-dim);
  font-family: var(--font-mono);
  font-size: .75rem;
  letter-spacing: .15em;
  padding: 8px;
  cursor: pointer;
  transition: all .15s;
}
.tab.active {
  border-color: var(--green-dim);
  color: var(--green);
  background: rgba(0,255,65,.06);
}

/* spinner */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--green-dark);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* user badge */
.user-badge {
  font-size: .7rem;
  letter-spacing: .15em;
  color: var(--green-dim);
  margin-bottom: 20px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  display: inline-block;
}
.user-badge span { color: var(--green); }
</style>
</head>
<body>
<div id="noise"></div>

<div id="app">
  <header class="sys-header">
    <div class="sys-title">AUTH_SYS <span class="blink">_</span></div>
    <div class="sys-sub">SECURE ACCESS TERMINAL · v2.4.1</div>
  </header>

  <!-- ══ AUTH PANEL ══════════════════════════════════════ -->
  <div class="panel" id="panel-auth">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">[ ВОЙТИ ]</button>
      <button class="tab"        onclick="switchTab('register')">[ РЕГИСТРАЦИЯ ]</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <div class="panel-title">АВТОРИЗАЦИЯ</div>
      <div class="field">
        <label>ИДЕНТИФИКАТОР</label>
        <input id="l-login" type="text" placeholder="user@domain" autocomplete="username">
      </div>
      <div class="field">
        <label>ПАРОЛЬ</label>
        <input id="l-password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="btn-login" onclick="doLogin()">ВОЙТИ В СИСТЕМУ</button>

      <!-- Блок блокировки — скрыт по умолчанию -->
      <div id="lockout-block" class="hidden" style="margin-top:16px;">
        <div style="border:1px solid #ff333344; padding:14px; background:rgba(255,51,51,.04);">
          <div style="font-size:.7rem;letter-spacing:.2em;color:var(--red);margin-bottom:8px;">
            ⚠ АККАУНТ ЗАБЛОКИРОВАН
          </div>
          <div style="font-size:.8rem;color:#ff6666;margin-bottom:10px;" id="lockout-msg">
            Превышен лимит попыток.
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-family:var(--font-display);font-size:2.4rem;color:var(--red);
                        text-shadow:0 0 12px var(--red);min-width:48px;text-align:center;"
                 id="lockout-countdown">—</div>
            <div>
              <div style="font-size:.62rem;letter-spacing:.2em;color:#883333;">РАЗБЛОКИРОВКА ЧЕРЕЗ</div>
              <div style="height:4px;background:#1a0505;margin-top:5px;width:160px;overflow:hidden;">
                <div id="lockout-bar" style="height:100%;background:var(--red);
                     box-shadow:0 0 6px var(--red);transition:width .95s linear;width:100%;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" class="hidden">
      <div class="panel-title">РЕГИСТРАЦИЯ</div>
      <div class="field">
        <label>НОВЫЙ ИДЕНТИФИКАТОР</label>
        <input id="r-login" type="text" placeholder="придумайте логин" autocomplete="username">
      </div>
      <div class="field">
        <label>НОВЫЙ ПАРОЛЬ</label>
        <input id="r-password" type="password" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn" id="btn-register" onclick="doRegister()">СОЗДАТЬ АККАУНТ</button>
    </div>
  </div>

  <!-- ══ SECURE ZONE ═════════════════════════════════════ -->
  <div class="panel hidden" id="panel-secure">
    <div class="panel-title">ЗАЩИЩЁННАЯ ЗОНА</div>
    <div class="user-badge">СЕССИЯ: <span id="session-user">—</span></div>

    <button class="btn" onclick="loadStatus()">
      <span id="status-spinner" class="spinner hidden"></span>СТАТУС СИСТЕМЫ
    </button>
    <button class="btn btn-danger" onclick="doLogout()" style="margin-top:10px;">
      ЗАВЕРШИТЬ СЕССИЮ
    </button>

    <div id="status-block" class="hidden">
      <hr class="divider">
      <div class="panel-title" style="font-size:1.2rem;">МЕТРИКИ</div>
      <div class="metric-grid">
        <div class="metric-card">
          <div class="m-label">CPU LOAD</div>
          <div class="m-value" id="m-cpu">—<span class="m-unit">%</span></div>
          <div class="bar-wrap"><div class="bar-fill" id="bar-cpu" style="width:0%"></div></div>
        </div>
        <div class="metric-card">
          <div class="m-label">RAM USAGE</div>
          <div class="m-value" id="m-ram">—<span class="m-unit">%</span></div>
          <div class="bar-wrap"><div class="bar-fill" id="bar-ram" style="width:0%"></div></div>
        </div>
        <div class="metric-card">
          <div class="m-label">DISK</div>
          <div class="m-value" id="m-disk">—<span class="m-unit">%</span></div>
          <div class="bar-wrap"><div class="bar-fill" id="bar-disk" style="width:0%"></div></div>
        </div>
        <div class="metric-card">
          <div class="m-label">UPTIME</div>
          <div class="m-value" id="m-uptime">—<span class="m-unit">min</span></div>
          <div class="bar-wrap"><div class="bar-fill" id="bar-uptime" style="width:0%"></div></div>
        </div>
      </div>
      <div class="metric-card" style="grid-column:span 2; margin-bottom:14px;">
        <div class="m-label">NETWORK I/O</div>
        <div style="display:flex; gap:20px; margin-top:6px;">
          <div>
            <div style="font-size:.65rem;color:var(--green-dim);letter-spacing:.2em;">↓ IN</div>
            <div class="m-value" style="font-size:1.5rem;" id="m-netin">—<span class="m-unit">KB/s</span></div>
          </div>
          <div>
            <div style="font-size:.65rem;color:var(--green-dim);letter-spacing:.2em;">↑ OUT</div>
            <div class="m-value" style="font-size:1.5rem;" id="m-netout">—<span class="m-unit">KB/s</span></div>
          </div>
        </div>
      </div>

      <hr class="divider">
      <div class="panel-title" style="font-size:1.1rem;">СИСТЕМНЫЙ ЛОГ</div>
      <div id="log-lines"></div>
    </div>
  </div>
</div>

<!-- ══ TOAST AREA ═══════════════════════════════════════ -->
<div id="toast-area"></div>

<!-- ══ PROMPT BAR ═══════════════════════════════════════ -->
<div class="prompt-bar">
  <span>AUTH_SYS · SECURE TERMINAL</span>
  <span id="clock"></span>
</div>

<script>
/* ═══════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════ */
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ru-RU', {hour12: false});
}
setInterval(updateClock, 1000);
updateClock();

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function toast(msg, type = 'ok', duration = 3500) {
  const area = document.getElementById('toast-area');
  const el = document.createElement('div');
  el.className = `toast ${type === 'error' ? 'error' : type === 'warn' ? 'warn' : ''}`;
  el.textContent = (type === 'error' ? '✗ ' : type === 'warn' ? '⚠ ' : '✓ ') + msg;
  area.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => el.remove(), 350);
  }, duration);
}

/* ═══════════════════════════════════════════════
   TAB SWITCH
═══════════════════════════════════════════════ */
function switchTab(tab) {
  const tabs = document.querySelectorAll('.tab');
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  tabs[0].classList.toggle('active', tab === 'login');
  tabs[1].classList.toggle('active', tab === 'register');
}

/* ═══════════════════════════════════════════════
   PANEL SWITCH
═══════════════════════════════════════════════ */
function showSecure(username) {
  document.getElementById('panel-auth').classList.add('hidden');
  document.getElementById('panel-secure').classList.remove('hidden');
  document.getElementById('status-block').classList.add('hidden');
  document.getElementById('session-user').textContent = username.toUpperCase();
}
function showAuth() {
  document.getElementById('panel-secure').classList.add('hidden');
  document.getElementById('panel-auth').classList.remove('hidden');
}

/* ═══════════════════════════════════════════════
   API HELPER
═══════════════════════════════════════════════ */
async function api(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(endpoint, opts);
  const data = await res.json();
  return { ok: res.ok, status: res.status, data };
}

/* ═══════════════════════════════════════════════
   ENTER KEY SUPPORT
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const secVisible = !document.getElementById('panel-secure').classList.contains('hidden');
  if (secVisible) return;
  const loginVisible = !document.getElementById('form-login').classList.contains('hidden');
  if (loginVisible) doLogin();
  else doRegister();
});

/* ═══════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════
   LOCKOUT COUNTDOWN TIMER
═══════════════════════════════════════════════ */
let _lockoutTimer = null;

function startLockoutTimer(seconds, message) {
  // Показываем блок блокировки, скрываем кнопку
  const btn     = document.getElementById('btn-login');
  const block   = document.getElementById('lockout-block');
  const msg     = document.getElementById('lockout-msg');
  const counter = document.getElementById('lockout-countdown');
  const bar     = document.getElementById('lockout-bar');

  btn.disabled  = true;
  btn.classList.add('hidden');
  block.classList.remove('hidden');
  msg.textContent = message;

  let remaining = Math.ceil(seconds);
  const total   = remaining;

  const tick = () => {
    counter.textContent = remaining;
    // Анимируем прогресс-бар
    requestAnimationFrame(() => {
      bar.style.width = (remaining / total * 100) + '%';
    });

    if (remaining <= 0) {
      clearInterval(_lockoutTimer);
      _lockoutTimer = null;
      // Скрываем блок, возвращаем кнопку
      block.classList.add('hidden');
      btn.classList.remove('hidden');
      btn.disabled = false;
      btn.textContent = 'ВОЙТИ В СИСТЕМУ';
      toast('Блокировка снята. Можно войти.', 'ok');
      document.getElementById('l-password').value = '';
      document.getElementById('l-password').focus();
    } else {
      remaining--;
    }
  };

  tick(); // сразу показать текущее значение
  _lockoutTimer = setInterval(tick, 1000);
}

/* ═══════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════ */
async function doLogin() {
  const login    = document.getElementById('l-login').value.trim();
  const password = document.getElementById('l-password').value;
  const btn      = document.getElementById('btn-login');

  if (!login || !password) { toast('Заполните все поля.', 'error'); return; }

  // Если таймер блокировки уже идёт — не отправляем запрос
  if (_lockoutTimer) {
    toast('Аккаунт заблокирован. Дождитесь разблокировки.', 'warn');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>ПРОВЕРКА...';

  const { ok, status, data } = await api('/api/login', 'POST', { login, password });

  if (ok) {
    btn.disabled = false;
    btn.textContent = 'ВОЙТИ В СИСТЕМУ';
    toast(data.message, 'ok');
    showSecure(login);
    return;
  }

  // 429 — лимит только что исчерпан → запускаем таймер
  if (status === 429) {
    btn.disabled = false;
    btn.textContent = 'ВОЙТИ В СИСТЕМУ';
    toast(data.error, 'warn', (data.locked_for || 10) * 1000 + 500);
    startLockoutTimer(data.locked_for || 10, data.error);
    return;
  }

  // 423 — повторная попытка во время блокировки (запрос всё же дошёл до сервера)
  if (status === 423) {
    btn.disabled = false;
    btn.textContent = 'ВОЙТИ В СИСТЕМУ';
    // Перезапускаем таймер с актуальным временем с сервера
    if (!_lockoutTimer) {
      startLockoutTimer(data.locked_for || 5, data.error);
    } else {
      toast(data.error, 'warn');
    }
    return;
  }

  // Обычная ошибка (неверный пароль и т.д.)
  btn.disabled = false;
  btn.textContent = 'ВОЙТИ В СИСТЕМУ';
  toast(data.error, 'error');
  document.getElementById('l-password').value = '';
  document.getElementById('l-password').focus();
}

/* ═══════════════════════════════════════════════
   REGISTER
═══════════════════════════════════════════════ */
async function doRegister() {
  const login    = document.getElementById('r-login').value.trim();
  const password = document.getElementById('r-password').value;
  const btn      = document.getElementById('btn-register');

  if (!login || !password) { toast('Заполните все поля.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>РЕГИСТРАЦИЯ...';

  const { ok, data } = await api('/api/register', 'POST', { login, password });

  btn.disabled = false;
  btn.textContent = 'СОЗДАТЬ АККАУНТ';

  if (ok) {
    toast(data.message, 'ok');
    document.getElementById('r-login').value = '';
    document.getElementById('r-password').value = '';
    switchTab('login');
    document.getElementById('l-login').value = login;
    document.getElementById('l-password').focus();
  } else {
    toast(data.error, 'error');
  }
}

/* ═══════════════════════════════════════════════
   LOGOUT
═══════════════════════════════════════════════ */
async function doLogout() {
  await api('/api/logout', 'POST');
  toast('Сессия завершена.', 'ok');
  showAuth();
  document.getElementById('l-login').value = '';
  document.getElementById('l-password').value = '';
}

/* ═══════════════════════════════════════════════
   STATUS / METRICS
═══════════════════════════════════════════════ */
function barColor(el, val) {
  el.classList.remove('hot','crit');
  if (val > 85) el.classList.add('crit');
  else if (val > 65) el.classList.add('hot');
}

function animateValue(el, target) {
  let cur = 0;
  const step = () => {
    cur = Math.min(cur + Math.ceil(target / 20), target);
    el.childNodes[0].textContent = cur;
    if (cur < target) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

function renderLog() {
  const msgs = [
    ['INFO',  'Системные службы активны'],
    ['INFO',  'Брандмауэр: правила загружены'],
    ['OK',    'Аутентификация токена'],
    ['INFO',  'Планировщик задач: idle'],
    ['WARN',  'Нагрузка диска > 80%'],
  ];
  const now = Date.now();
  const lines = msgs.map((m, i) => {
    const t = new Date(now - (msgs.length - i) * 47000);
    const ts = t.toLocaleTimeString('ru-RU', {hour12:false});
    const cls = m[0] === 'WARN' ? 'lvl-warn' : 'lvl-ok';
    return `<div class="log-line"><span class="ts">${ts}</span><span class="${cls}">[${m[0]}]</span><span>${m[1]}</span></div>`;
  });
  document.getElementById('log-lines').innerHTML = lines.join('');
}

async function loadStatus() {
  const spinner = document.getElementById('status-spinner');
  spinner.classList.remove('hidden');

  const { ok, data } = await api('/api/status');

  spinner.classList.add('hidden');

  if (!ok) { toast(data.error, 'error'); showAuth(); return; }

  // show block
  const block = document.getElementById('status-block');
  block.classList.remove('hidden');

  // cpu
  const cpu = data.cpu;
  const cpuEl = document.getElementById('m-cpu');
  cpuEl.childNodes[0].textContent = 0;
  animateValue(cpuEl, cpu);
  const barCpu = document.getElementById('bar-cpu');
  setTimeout(() => { barCpu.style.width = cpu + '%'; barColor(barCpu, cpu); }, 50);

  // ram
  const ram = data.ram;
  const ramEl = document.getElementById('m-ram');
  ramEl.childNodes[0].textContent = 0;
  animateValue(ramEl, ram);
  const barRam = document.getElementById('bar-ram');
  setTimeout(() => { barRam.style.width = ram + '%'; barColor(barRam, ram); }, 50);

  // disk
  const disk = data.disk;
  const diskEl = document.getElementById('m-disk');
  diskEl.childNodes[0].textContent = 0;
  animateValue(diskEl, disk);
  const barDisk = document.getElementById('bar-disk');
  setTimeout(() => { barDisk.style.width = disk + '%'; barColor(barDisk, disk); }, 50);

  // uptime — bar relative to 1440 min
  const uptime = data.uptime;
  const uptimeEl = document.getElementById('m-uptime');
  uptimeEl.childNodes[0].textContent = 0;
  animateValue(uptimeEl, uptime);
  const barUp = document.getElementById('bar-uptime');
  setTimeout(() => { barUp.style.width = Math.min(uptime/1440*100, 100) + '%'; }, 50);

  // network
  document.getElementById('m-netin').childNodes[0].textContent = data.net_in;
  document.getElementById('m-netout').childNodes[0].textContent = data.net_out;

  renderLog();
  toast('Метрики обновлены.', 'ok');
}
</script>
